{% extends "core/base.html" %}
{% block title %}Ajouter RIA — QHSE360{% endblock %}
{% block content %}
<style>
  :root{ --brand:#0b3a6a; --card:#fff; --border:#e6ebf2; --muted:#64748b; --shadow:0 10px 28px rgba(2,6,23,.07); }
  .wrap{max-width:1100px;margin:18px auto;padding:18px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}
  .title{font-size:22px;font-weight:950;color:var(--brand)}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
  .full{grid-column:1/-1}
  label{font-size:12px;color:var(--muted);font-weight:800;display:block;margin-bottom:6px}
  .input,.select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;background:#fff}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .btn{padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:#fff;text-decoration:none;font-weight:900;color:#0f172a;cursor:pointer}
  .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
</style>

<div class="wrap">
  <div class="card">
    <div class="title">➕ Ajouter un RIA</div>
    <p style="color:var(--muted);margin:6px 0 0">Inventaire des RIA par site.</p>

    <form method="post">
      {% csrf_token %}
      <div class="grid">
        <div>
          <label>Site *</label>
          <select class="select" name="site" id="siteSelect" required>
            <option value="">— Choisir —</option>
            {% for s in sites %}<option value="{{ s.id }}">{{ s.nom }}</option>{% endfor %}
          </select>
        </div>

        <div>
          <label>Zone (automatique)</label>
          <select class="select" name="zone" id="zoneSelect" disabled>
            <option value="">— Choisir un site d’abord —</option>
          </select>
        </div>

        <div>
          <label>Numéro *</label>
          <input class="input" name="numero" required placeholder="RIA-001">
        </div>
        <div>
          <label>Localisation *</label>
          <input class="input" name="localisation" required placeholder="EX: Couloir B - RDC">
        </div>

        <div>
          <label>Type RIA</label>
          <input class="input" name="type_ria" placeholder="Enrouleur / Poste fixe">
        </div>
        <div>
          <label>Diamètre tuyau</label>
          <input class="input" name="diametre_tuyau" placeholder="EX: 19mm / 25mm">
        </div>

        <div>
          <label>Longueur tuyau</label>
          <input class="input" name="longueur_tuyau" placeholder="EX: 20m">
        </div>
        <div>
          <label>Pression nominale</label>
          <input class="input" name="pression_nominale" placeholder="EX: 6 bar">
        </div>

        <div>
          <label>Marque</label>
          <input class="input" name="marque">
        </div>
        <div>
          <label>Année installation</label>
          <input class="input" name="annee_installation" placeholder="EX: 2023">
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Enregistrer</button>
        <a class="btn" href="{% url 'incendie:ria_list' %}">Annuler</a>
      </div>
    </form>
  </div>
</div>

<script>
  async function loadZonesForSite(siteId, zoneSelect) {
    zoneSelect.innerHTML = '';
    zoneSelect.disabled = true;

    if (!siteId) {
      zoneSelect.innerHTML = '<option value="">— Choisir un site d’abord —</option>';
      return;
    }

    zoneSelect.innerHTML = '<option value="">Chargement...</option>';

    try {
      const res = await fetch("{% url 'incendie:zones_by_site' %}?site=" + encodeURIComponent(siteId));
      const data = await res.json();
      const zones = data.zones || [];

      zoneSelect.innerHTML = '<option value="">— Aucune zone / Non défini —</option>';
      zones.forEach(z => {
        const opt = document.createElement('option');
        opt.value = z.id;
        opt.textContent = z.nom;
        zoneSelect.appendChild(opt);
      });

      zoneSelect.disabled = false;
    } catch (e) {
      zoneSelect.innerHTML = '<option value="">Erreur de chargement des zones</option>';
      zoneSelect.disabled = false;
    }
  }

  (function initSiteZone() {
    const siteSelect = document.getElementById('siteSelect');
    const zoneSelect = document.getElementById('zoneSelect');
    siteSelect.addEventListener('change', () => loadZonesForSite(siteSelect.value, zoneSelect));
  })();
</script>
{% endblock %}
